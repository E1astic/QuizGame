<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тестирование игры-викторины</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; }
        button { margin: 5px; padding: 10px 20px; cursor: pointer; }
        input, select { margin: 5px; padding: 8px; }
        #log { background: #f4f4f4; padding: 10px; height: 300px; overflow-y: scroll; font-family: monospace; }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
        
        /* Question Display Styles */
        #questionDisplay { 
            background: #e8f4f8; 
            padding: 20px; 
            margin: 20px 0; 
            border-radius: 8px;
            border: 2px solid #007bff;
        }
        #questionText { 
            font-size: 1.3em; 
            font-weight: bold; 
            margin-bottom: 15px;
            color: #333;
        }
        #questionProgress {
            color: #666;
            margin-bottom: 10px;
        }
        .answerOption {
            display: block;
            width: 100%;
            padding: 12px 15px;
            margin: 8px 0;
            background: white;
            border: 2px solid #007bff;
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
            font-size: 1em;
            transition: all 0.3s;
        }
        .answerOption:hover {
            background: #007bff;
            color: white;
        }
        .answerOption.selected {
            background: #007bff;
            color: white;
        }
        .answerOption.correct {
            background: #28a745;
            border-color: #28a745;
            color: white;
        }
        .answerOption.wrong {
            background: #dc3545;
            border-color: #dc3545;
            color: white;
        }
        .answerOption:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        #submitAnswerBtn {
            background: #28a745;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1em;
            margin-top: 15px;
        }
        #submitAnswerBtn:disabled {
            background: #ccc;
        }
        #answerResult {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
        }
        #answerResult.success {
            background: #d4edda;
            color: #155724;
        }
        #answerResult.error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
<h1>Тестирование игры-викторины</h1>

<div class="section">
    <h2>1. Подключение к WebSocket</h2>
    <button onclick="connect()">Подключиться</button>
    <button onclick="disconnect()">Отключиться</button>
    <span id="connectionStatus">Статус: Не подключено</span>
</div>

<div class="section">
    <h2>2. Создание игры</h2>
    <input type="text" id="quizId" placeholder="Quiz ID (UUID)" value="00000000-0000-0000-0000-000000000001">
    <button onclick="createGame()">Создать игру</button>
</div>

<div class="section">
    <h2>3. Присоединение команды</h2>
    <input type="text" id="gameId" placeholder="Game ID (UUID)">
    <input type="text" id="teamId" placeholder="Team ID (UUID)" value="00000000-0000-0000-0000-000000000001">
    <button onclick="joinGame()">Присоединиться</button>
</div>

<div class="section">
    <h2>4. Управление игрой</h2>
    <button onclick="startGame()">Начать игру</button>
    <button onclick="getQuestions()">Получить вопросы</button>
    <button onclick="finishGame()">Завершить игру</button>
</div>

<!-- Question Display Section -->
<div class="section" id="questionSection" style="display: none;">
    <h2>📝 Текущий вопрос</h2>
    <div id="questionDisplay">
        <div id="questionProgress">Вопрос <span id="currentQuestionNum">-</span> из <span id="totalQuestions">-</span></div>
        <div id="timerDisplay" style="font-size: 1.5em; font-weight: bold; color: #dc3545; text-align: center; margin: 10px 0;">⏱️ <span id="timeRemaining">30</span> сек.</div>
        <div id="questionText">Загрузка вопроса...</div>
        <div id="answersContainer"></div>
        <button id="submitAnswerBtn" onclick="submitSelectedAnswer()" disabled>Ответить</button>
        <div id="answerResult" style="display: none;"></div>
    </div>
</div>

<div class="section">
    <h2>Лог событий</h2>
    <button onclick="clearLog()">Очистить лог</button>
    <div id="log"></div>
</div>

<script>
    let stompClient = null;
    let currentGameId = null;
    let questionsSubscription = null;
    let currentQuestion = null;
    let selectedAnswerId = null;
    let isAnswering = false;
    let gameQuestionsCache = {}; // Cache for questions by gameId
    let questionTimerInterval = null; // Timer interval ID
    const QUESTION_TIME_LIMIT = 30; // seconds

    function log(message, type = 'info') {
        const logDiv = document.getElementById('log');
        const timestamp = new Date().toLocaleTimeString();
        const className = type === 'error' ? 'error' : type === 'success' ? 'success' : 'info';
        logDiv.innerHTML += `<div class="${className}">[${timestamp}] ${message}</div>`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    function clearLog() {
        document.getElementById('log').innerHTML = '';
    }

    function connect() {
        const socket = new SockJS('http://localhost:8040/quizgame/ws-game');
        stompClient = Stomp.over(socket);
        stompClient.debug = null;

        stompClient.connect({ host: '/' },
            function(frame) {
                log('✅ Connected', 'success');
                document.getElementById('connectionStatus').innerText = 'Status: Connected';

                // ✅ Subscribe to answers - ONLY ONCE on connect
                responseSubscription = stompClient.subscribe('/user/queue/answer', handleAnswerResponse);
            },
            function(error) {
                log('❌ Error: ' + error, 'error');
                console.error('STOMP error:', error);
            }
        );
    }

    // 🔍 Handler for answer responses from server
    function handleAnswerResponse(message) {
        try {
            const response = JSON.parse(message.body);
            console.log('📩 Answer response:', response);

            const resultDiv = document.getElementById('answerResult');
            
            if (response.correct) {
                log(`✅ ${response.message}`, 'success');
                resultDiv.className = 'success';
                resultDiv.innerText = response.message;
                resultDiv.style.display = 'block';
                
                // Highlight correct answer
                const selectedBtn = document.querySelector(`button[data-answer-id="${selectedAnswerId}"]`);
                if (selectedBtn) {
                    selectedBtn.classList.add('correct');
                }
                
                // Transition will be handled by handleTransition message
                log('📝 Waiting for transition to next question', 'info');
            } else {
                log(`❌ ${response.message}`, 'error');
                resultDiv.className = 'error';
                resultDiv.innerText = response.message;
                resultDiv.style.display = 'block';
                
                // Highlight wrong answer
                const selectedBtn = document.querySelector(`button[data-answer-id="${selectedAnswerId}"]`);
                if (selectedBtn) {
                    selectedBtn.classList.add('wrong');
                }
                
                // Keep showing current question for retry
                isAnswering = false;
                enableAnswerButtons();
            }
        } catch (e) {
            console.error('❌ Parse error in handleAnswerResponse:', e);
            log('💥 Answer response parse error: ' + e.message, 'error');
        }
    }

    function disconnect() {
        // ✅ Unsubscribe from all subscriptions
        if (responseSubscription) {
            responseSubscription.unsubscribe();
            responseSubscription = null;
        }
        if (stompClient) {
            stompClient.disconnect();
            stompClient = null;
            log('🔌 Disconnected', 'info');
        }
    }

    let topicSubscriptions = {}; // { topicName: subscription }

    function subscribeToGameTopics() {
        if (!currentGameId) {
            log('⚠️ currentGameId not set, subscription deferred', 'warning');
            return;
        }

        const prefix = `/topic/game/${currentGameId}`;
        const topics = [
            { name: 'teams', path: `${prefix}/teams` },
            { name: 'started', path: `${prefix}/started` },
            { name: 'questions', path: `${prefix}/questions` },
            { name: 'answer', path: `${prefix}/answer` },
            { name: 'finished', path: `${prefix}/finished` },
            { name: 'transition', path: `${prefix}/transition` }
        ];

        topics.forEach(({name, path}) => {
            // Unsubscribe from old one if exists
            if (topicSubscriptions[name]) {
                topicSubscriptions[name].unsubscribe();
                console.log(`🔄 Old subscription unsubscribed: ${name}`);
            }

            // Create new one
            topicSubscriptions[name] = stompClient.subscribe(path, function(message) {
                console.log(`📩 [${name}] Raw:`, message.body.substring(0, 200));

                switch(name) {
                    case 'questions':
                        handleQuestions(message);
                        break;
                    case 'answer':
                        handleAnswerResponse(message);
                        break;
                    case 'transition':
                        handleTransition(message);
                        break;
                    case 'teams':
                    case 'started':
                    case 'finished':
                        log(`📨 ${name}: ${message.body}`, 'info');
                        break;
                }
            });
            console.log(`✅ Subscribed: ${path}`);
        });

        log(`🔗 Subscribed to game ${currentGameId} topics`, 'success');
    }

    // ✅ Cleanup on game change or disconnect
    function unsubscribeFromGameTopics() {
        Object.values(topicSubscriptions).forEach(sub => {
            if (sub) sub.unsubscribe();
        });
        topicSubscriptions = {};
        log('🧹 Game topic subscriptions cleared', 'info');
    }

    function send(destination, body) {
        if (stompClient && stompClient.connected) {
            log(`Отправка в ${destination}: ${JSON.stringify(body)}`, 'info');
            stompClient.send(destination, {}, JSON.stringify(body));
        } else {
            log('Не подключено к WebSocket', 'error');
        }
    }

    function createGame() {
        const quizId = document.getElementById('quizId').value;
        if (!quizId) {
            log('❌ Укажите Quiz ID', 'error');
            return;
        }
        if (!stompClient || !stompClient.connected) {
            log('❌ Нет WebSocket соединения', 'error');
            return;
        }

        // Если создаём новую игру — очищаем старые подписки
        if (currentGameId) {
            unsubscribeFromGameTopics();
        }

        log(`📤 Создание игры для quiz: ${quizId}`, 'info');
        send('/app/game/create', { quizId: quizId });
        // ✅ Подписка на ответ уже есть в connect(), ничего добавлять не нужно
    }

    function joinGame() {
        const gameId = document.getElementById('gameId').value;
        const teamId = document.getElementById('teamId').value;

        if (!gameId || !teamId) {
            log('Укажите Game ID и Team ID', 'error');
            return;
        }

        // 🔑 Синхронизируем currentGameId перед отправкой запроса
        currentGameId = gameId;
        log(`🔄 Game ID установлен: ${currentGameId}`, 'info');

        // Подписываемся на топики игры если еще не подписаны
        if (stompClient && stompClient.connected) {
            subscribeToGameTopics();
        }

        send('/app/game/join', { gameId: gameId, teamId: teamId });
    }

    function startGame() {
        const gameId = document.getElementById('gameId').value;

        if (!gameId) {
            log('Укажите Game ID', 'error');
            return;
        }

        send('/app/game/start', gameId);
    }

    function getQuestions() {
        const inputGameId = document.getElementById('gameId').value.trim();
        if (!inputGameId) {
            log('❌ Укажите Game ID', 'error');
            return;
        }
        if (!stompClient || !stompClient.connected) {
            log('❌ Нет WebSocket соединения', 'error');
            return;
        }

        // 🔑 КРИТИЧЕСКИ ВАЖНО: синхронизируем ID перед подпиской
        currentGameId = inputGameId;
        log(`🔄 Game ID синхронизирован: ${currentGameId}`, 'info');

        // Отписываемся от старой подписки (если есть), чтобы не дублировать
        if (questionsSubscription) {
            questionsSubscription.unsubscribe();
            log('🔄 Старая подписка на вопросы удалена', 'info');
        }

        // Создаём новую подписку
        const destination = `/topic/game/${currentGameId}/questions`;
        questionsSubscription = stompClient.subscribe(destination, handleQuestions);
        log(`📡 Подписка создана: ${destination}`, 'info');

        // Отправляем запрос
        send('/app/game/questions', currentGameId);
    }

    function handleQuestions(message) {
        console.log('📩 STOMP RAW MESSAGE:', message);
        console.log('📦 Headers:', message.headers);
        console.log('📦 Body type:', typeof message.body);

        try {
            const rawData = message.body;
            if (!rawData || rawData.trim().length === 0) {
                log('⚠️ Received empty message', 'warning');
                return;
            }

            const questions = JSON.parse(rawData);
            log(`✅ Received questions: ${Array.isArray(questions) ? questions.length : 'not an array'}`, 'success');

            // Cache questions for this game
            if (currentGameId && Array.isArray(questions)) {
                gameQuestionsCache[currentGameId] = questions;
                log(`📚 Questions cached for game ${currentGameId}`, 'info');
            }

            if (Array.isArray(questions) && questions.length > 0) {
                // Show first question
                displayQuestion(questions[0]);
            }
        } catch (e) {
            console.error('❌ JSON Parse Error:', e);
            log(`💥 Parse error: ${e.message}`, 'error');
            // Output first 100 chars to understand what came
            log(`📄 Raw data: ${message.body.substring(0, 150)}...`, 'info');
        }
    }

    function handleAnswerResponse(message) {
        try {
            const response = JSON.parse(message.body);
            console.log('📩 Answer response:', response);

            const resultDiv = document.getElementById('answerResult');
            
            if (response.correct) {
                log(`✅ ${response.message}`, 'success');
                resultDiv.className = 'success';
                resultDiv.innerText = response.message;
                resultDiv.style.display = 'block';
                
                // Highlight correct answer
                const selectedBtn = document.querySelector(`button[data-answer-id="${selectedAnswerId}"]`);
                if (selectedBtn) {
                    selectedBtn.classList.add('correct');
                }
                
                // Check if there's a next question - transition will be handled by handleTransition
                if (response.currentQuestion) {
                    log('📝 Moving to next question', 'info');
                } else {
                    log('🏆 Game finished!', 'success');
                    resultDiv.innerText = response.message + ' Game finished!';
                }
            } else {
                log(`❌ ${response.message}`, 'error');
                resultDiv.className = 'error';
                resultDiv.innerText = response.message;
                resultDiv.style.display = 'block';
                
                // Highlight wrong answer
                const selectedBtn = document.querySelector(`button[data-answer-id="${selectedAnswerId}"]`);
                if (selectedBtn) {
                    selectedBtn.classList.add('wrong');
                }
                
                // Keep showing current question for retry
                isAnswering = false;
                enableAnswerButtons();
            }
        } catch (e) {
            console.error('❌ Parse error:', e);
            log('💥 Answer parse error: ' + e.message, 'error');
        }
    }

    function handleTransition(message) {
        try {
            const transition = JSON.parse(message.body);
            console.log('📩 Transition received:', transition);
            
            log(`🔄 Transition to question ${transition.questionNumber}/${transition.totalQuestions}`, 'info');
            
            if (transition.correctTeamName) {
                log(`✅ Team "${transition.correctTeamName}" answered correctly!`, 'success');
            } else if (transition.correctTeamId === null) {
                log('⏰ Time is up or all teams answered incorrectly', 'warning');
            }
            
            // Display the next question
            if (transition.questionNumber && transition.questionText) {
                // Create a question object from transition data
                const question = {
                    questionId: null, // Will be populated when we get full question data
                    questionText: transition.questionText,
                    questionNumber: transition.questionNumber,
                    totalQuestions: transition.totalQuestions,
                    answers: [] // Answers will come from the questions cache or next message
                };
                
                // Try to get answers from cached questions
                const cachedQuestions = gameQuestionsCache[currentGameId];
                if (cachedQuestions && Array.isArray(cachedQuestions)) {
                    const currentIndex = transition.questionNumber - 1;
                    if (currentIndex >= 0 && currentIndex < cachedQuestions.length) {
                        const cachedQuestion = cachedQuestions[currentIndex];
                        question.questionId = cachedQuestion.questionId;
                        question.answers = cachedQuestion.answers || [];
                    }
                }
                
                displayQuestion(question);
            }
        } catch (e) {
            console.error('❌ Parse error in handleTransition:', e);
            log('💥 Transition parse error: ' + e.message, 'error');
        }
    }

    function displayQuestion(question) {
        currentQuestion = question;
        selectedAnswerId = null;
        isAnswering = false;
        
        // Hide result from previous answer
        document.getElementById('answerResult').style.display = 'none';
        
        // Update progress
        document.getElementById('currentQuestionNum').innerText = question.questionNumber || '?';
        document.getElementById('totalQuestions').innerText = question.totalQuestions || '?';
        
        // Reset and start timer
        resetTimer();
        startTimer();
        
        // Update question text
        document.getElementById('questionText').innerText = question.questionText;
        
        // Create answer buttons
        const answersContainer = document.getElementById('answersContainer');
        answersContainer.innerHTML = '';
        
        if (question.answers && Array.isArray(question.answers)) {
            question.answers.forEach(answer => {
                const btn = document.createElement('button');
                btn.className = 'answerOption';
                btn.innerText = answer.answerText;
                btn.dataset.answerId = answer.answerId;
                btn.onclick = () => selectAnswer(answer.answerId, btn);
                answersContainer.appendChild(btn);
            });
        }
        
        // Show question section
        document.getElementById('questionSection').style.display = 'block';
        
        // Disable submit button until answer is selected
        document.getElementById('submitAnswerBtn').disabled = true;
        
        log(`📝 Вопрос ${question.questionNumber}/${question.totalQuestions}: ${question.questionText}`, 'info');
    }
    
    function startTimer() {
        let timeLeft = QUESTION_TIME_LIMIT;
        document.getElementById('timeRemaining').innerText = timeLeft;
        
        // Clear any existing timer
        if (questionTimerInterval) {
            clearInterval(questionTimerInterval);
        }
        
        questionTimerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timeRemaining').innerText = timeLeft;
            
            if (timeLeft <= 0) {
                clearInterval(questionTimerInterval);
                log('⏰ Время на вопрос вышло!', 'warning');
            }
        }, 1000);
    }
    
    function resetTimer() {
        if (questionTimerInterval) {
            clearInterval(questionTimerInterval);
            questionTimerInterval = null;
        }
        document.getElementById('timeRemaining').innerText = QUESTION_TIME_LIMIT;
    }

    function selectAnswer(answerId, btnElement) {
        if (isAnswering) return;
        
        selectedAnswerId = answerId;
        
        // Remove selected class from all buttons
        document.querySelectorAll('.answerOption').forEach(btn => {
            btn.classList.remove('selected');
        });
        
        // Add selected class to clicked button
        btnElement.classList.add('selected');
        
        // Enable submit button
        document.getElementById('submitAnswerBtn').disabled = false;
    }

    function enableAnswerButtons() {
        document.querySelectorAll('.answerOption').forEach(btn => {
            btn.disabled = false;
        });
        document.getElementById('submitAnswerBtn').disabled = false;
    }

    function submitSelectedAnswer() {
        if (!selectedAnswerId || !currentQuestion) {
            log('❌ Выберите вариант ответа', 'error');
            return;
        }
        
        if (isAnswering) {
            log('⏳ Ответ уже отправляется...', 'warning');
            return;
        }
        
        const gameId = document.getElementById('gameId').value;
        const teamId = document.getElementById('teamId').value;
        
        if (!gameId || !teamId) {
            log('❌ Game ID или Team ID не указан', 'error');
            return;
        }
        
        isAnswering = true;
        
        // Disable all answer buttons
        document.querySelectorAll('.answerOption').forEach(btn => {
            btn.disabled = true;
        });
        document.getElementById('submitAnswerBtn').disabled = true;
        
        send('/app/game/answer', {
            gameId: gameId,
            questionId: currentQuestion.questionId,
            answerId: selectedAnswerId,
            teamId: teamId
        });
    }

    function finishGame() {
        const gameId = document.getElementById('gameId').value;

        if (!gameId) {
            log('Укажите Game ID', 'error');
            return;
        }

        send('/app/game/finish', gameId);
    }
</script>
</body>
</html>
